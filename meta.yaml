# meta.yaml
package:
  name: grikod3
  version: "0.0.0"

source:
  url: ""
  blake2b-256: ""
  exclude:
    - docs/*
    - notebooks/*
    - tests/*
    - test/*
    - examples/*
    - build/*
    - dist/*
    - .git/*
    - .github/*
    - "*.egg-info"
    - "*.pyc"
    - "__pycache__"

build:
  number: 0
  noarch: python
  #script: "{{ PYTHON }} -m pip install . -vv"
  script: |
    {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  # --no-deps: Bağımlılıkları pip kurmasın (conda kuracak)
  # --no-build-isolation: Daha hızlı build

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
    - setuptools_scm
    - cython
  run:
    - python

about:
  home: https://github.com/WhiteSymmetry/grikod3
  license: AGPL-3.0-or-later
  summary: 'Binary to Gray code conversion package.'
  description: |
    Binary to Gray code conversion package.
  dev_url: https://github.com/WhiteSymmetry/grikod3
  doc_url: https://github.com/WhiteSymmetry/grikod3
  doc_source_url: https://github.com/WhiteSymmetry/grikod3/blob/main/README.md
  
