{% set version = "0.1.4" %}

package:
  name: grikod3
  version: {{ version }}

source:
  path: .
  url: 
  blake2b-256: 

build:
  noarch: python  # Platformdan bağımsız bir paket oluşturur
  script: python -m pip install --ignore-installed .  # Kurulum komutu
  number: 0

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
    - setuptools_scm
  run:
    - python

about:
  home: https://github.com/WhiteSymmetry/grikod3
  license: AGPL-3.0-or-later
  summary: 'Binary to Gray code conversion package.'
  description: |
    Binary to Gray code conversion package.
  dev_url: https://github.com/WhiteSymmetry/grikod3
  doc_url: https://github.com/WhiteSymmetry/grikod3
  doc_source_url: https://github.com/WhiteSymmetry/grikod3/blob/main/README.md
  
