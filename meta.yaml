# meta.yaml
package:
  name: grikod3
  version: "0.0.0"

source:
  url: ""
  blake2b-256: ""
  exclude:
    - docs/*
    - notebooks/*
    - tests/*
    - test/*
    - examples/*
    - build/*
    - dist/*
    - .git/*
    - .github/*
    - "*.egg-info"
    - "*.pyc"
    - "__pycache__"

build:
  number: 0
  noarch: python
  script: |
    echo "Current directory: $(pwd)"
    echo "Files in current directory:"
    ls -la
    # Pip kurulumu için doğru dizinde olduğumuzdan emin olalım
    if [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
      {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
    else
      echo "ERROR: setup.py or pyproject.toml not found!"
      exit 1
    fi

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
    - setuptools_scm
    - cython
    - pytest
  run:
    - python

about:
  home: https://github.com/WhiteSymmetry/grikod3
  license: AGPL-3.0-or-later
  summary: 'Binary to Gray code conversion package.'
  description: |
    Binary to Gray code conversion package.
  dev_url: https://github.com/WhiteSymmetry/grikod3
  doc_url: https://github.com/WhiteSymmetry/grikod3
  doc_source_url: https://github.com/WhiteSymmetry/grikod3/blob/main/README.md
  
