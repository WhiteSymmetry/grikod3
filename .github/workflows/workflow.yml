name: Publish to PyPI (sdist only)

on:
  workflow_dispatch:   # Sadece manuel tetikleme

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build source distribution (sdist)
        run: python -m build --sdist

      - name: Publish to PyPI (sadece sdist)
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist/
          # İsteğe bağlı: sadece .tar.gz dosyalarını yükle
          # packages: dist/*.tar.gz
