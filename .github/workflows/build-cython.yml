name: Cython Derlemeleri (Linux, Windows, macOS)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    runs-on: ${{ matrix.os }}

    steps:
      - name: Kodu çek
        uses: actions/checkout@v7

      - name: Python ${{ matrix.python-version }} kurulumu
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # macOS için derleyici kontrolü
      - name: macOS derleme araçlarını kontrol et
        if: runner.os == 'macOS'
        run: |
          xcode-select -p || xcode-select --install
          which gcc || brew install gcc

      # Windows için Visual C++ kurulumu
      - name: Windows derleme araçlarını yükle
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cython ve setuptools yükle
        run: |
          python -m pip install --upgrade pip
          pip install cython>=3.0.0 setuptools

      - name: Cython derlemesi yap
        run: |
          python setup.py build_ext --inplace

      - name: Derlenmiş dosyaları yükle
        uses: actions/upload-artifact@v7
        with:
          name: derlenmis-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            **/*.so
            **/*.pyd
            **/*.dylib
