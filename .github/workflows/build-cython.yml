name: Cython Derlemeleri (Linux, Windows, macOS)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    runs-on: ${{ matrix.os }}

    steps:
      - name: Kodu çek
        uses: actions/checkout@v7

      - name: Python ${{ matrix.python-version }} kurulumu
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cython ve setuptools yükle
        run: |
          python -m pip install --upgrade pip
          pip install cython setuptools

      - name: Cython derlemesi yap
        run: |
          python setup.py build_ext --inplace

      - name: Derlenmiş dosyaları yükle (Artefact olarak)
        uses: actions/upload-artifact@v7
        with:
          name: derlenmis-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            **/*.so
            **/*.pyd
            **/*.dylib
