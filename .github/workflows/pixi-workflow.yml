name: Pixi CI

on:
  workflow_dispatch:

# OIDC (Trusted Publishers) bağlantısı için bu izin bloğu ŞARTTIR
permissions:
  id-token: write
  contents: read

jobs:
  test-and-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 🚀 Install Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: "latest"
          cache: false # Kilit dosyası yoksa hatayı engellemek için false yapın

      - name: 📦 Install dependencies
        run: pixi install --frozen

      - name: 🔧 Install package in editable mode
        run: pixi run pip install -e .

      - name: 🧪 Run tests
        run: pixi run test

      - name: 🏗️ Build package (Conda/Pixi formatı)
        # prefix.dev bir Conda kanalıdır. Standart Python wheel paketleri yüklenemez.
        # Paketi rattler-build veya pixi ile Conda paketi (.tar.bz2 veya .conda) olarak derlemelisiniz.
        run: pixi run build

      - name: 📤 prefix.dev'e Yükle (Trusted Publishing)
        # 'prefix' kelimesi komutun neresine yükleneceğini söyler. `--channel` bundan sonra gelmelidir.
        run: pixi upload prefix --channel bilgi output/*.conda
