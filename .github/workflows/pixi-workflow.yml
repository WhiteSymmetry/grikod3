name: Pixi CI

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-and-build:
    # Matristen gelen işletim sistemini dinamik olarak kullanır
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 🚀 Tüm ana işletim sistemlerini matrise ekledik
        os: [ubuntu-latest, windows-latest, macos-13, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 🚀 Install Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: "latest"
          cache: true

      - name: 📦 Install dependencies
        run: pixi install --frozen

      - name: 🔧 Install package in editable mode
        run: pixi run pip install -e .

      - name: 🧪 Run tests
        run: pixi run test

      - name: 🏗️ Paket Derle ve prefix.dev'e Yayınla (Trusted Publishing)
        # Hangi sunucuda çalışıyorsa (Win/Mac/Linux) o platformun paketini derleyip yükler
        run: pixi publish --target-channel https://prefix.dev/bilgi
