name: Derle, Commit ve Artefakt

on:
  workflow_dispatch:

permissions:
  contents: write   # Push izni

jobs:
  build_and_push:
    name: Derle ve push (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - name: Kodu çek
        uses: actions/checkout@v7

      - name: Python kurulumu
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Windows derleyici araçları
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Gerekli paketleri yükle
        run: |
          python -m pip install --upgrade pip
          pip install cython setuptools wheel

      - name: Derleme
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            py -${{ matrix.python-version }} setup.py build_ext --inplace --verbose
          else
            python${{ matrix.python-version }} setup.py build_ext --inplace --verbose
          fi
          # Derleme çıktılarını listele
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            dir grikod3
          else
            ls -la grikod3
          fi
        shell: bash

      - name: Commit ve push (sadece bu job)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Uzaktaki değişiklikleri çek (rebase ile)
          git pull --rebase origin main || true
          # Derlenmiş dosyaları zorla ekle
          git add -f grikod3/*.so grikod3/*.pyd || true
          # Değişiklik varsa commit, yoksa atla
          if git diff --cached --quiet; then
            echo "⚠️ Değişiklik yok, commit atlanıyor."
          else
            git commit -m "Derlenmiş uzantılar (py${{ matrix.python-version }} / ${{ matrix.os }})"
            git push origin main || true
          fi
        shell: bash

      - name: Artefakt olarak kaydet (yedek)
        uses: actions/upload-artifact@v7
        with:
          name: derlenmis-${{ matrix.os }}-py${{ matrix.python-version }}
          path: grikod3/*.so grikod3/*.pyd
