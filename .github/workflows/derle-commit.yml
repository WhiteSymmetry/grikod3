name: Derle ve Commit Et

on:
  workflow_dispatch:

permissions:
  contents: write   # 🔑 Push izni

jobs:
  build_and_commit:
    name: Derle ve commit et (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - name: Kodu çek
        uses: actions/checkout@v7

      - name: Python kurulumu
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Windows derleyici araçları
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Gerekli paketleri yükle
        run: |
          python -m pip install --upgrade pip
          pip install cython setuptools wheel

      - name: Derleme
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            py -${{ matrix.python-version }} setup.py build_ext --inplace
          else
            python${{ matrix.python-version }} setup.py build_ext --inplace
          fi
          # Çıktıları listele
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            dir grikod3
          else
            ls -la grikod3
          fi
        shell: bash

      - name: Commit and push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add grikod3/*.so grikod3/*.pyd || true
          if ! git diff --cached --quiet; then
            git commit -m "Derlenmiş uzantılar (py${{ matrix.python-version }} / ${{ matrix.os }})"
            git push
          else
            echo "Değişiklik yok, commit atlanıyor."
          fi
        shell: bash
