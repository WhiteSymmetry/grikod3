[workspace]
preview = ["pixi-build"]
authors = ["Mehmet Keçeci <mkececi@yaani.com>"]
# 🌍 Sadece standart conda-forge kalsın. Çözücü uyuşmazlıklarını %100 bitirir:
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]
name = "grikod3"
version = "0.1.6"

[package]
name = "grikod3"
version = "0.1.6"
license = "AGPL-3.0-or-later"

[dependencies]
python = ">=3.11,<3.15" # ⚠️ Önemli: python 3.14 henüz beta/kararsız aşamadadır, numpy/cython osx-arm64 için çözülemeyebilir. 3.13 üst sınırı en güvenlisidir.
pip = ">=24.0"
numpy = ">=1.24"
cython = ">=3.0"
pytest = "*"

[tasks]
build = "python -m build"
start = "python -c 'import grikod3; print(grikod3.__version__)'"
install = "pip install -e ."
test = { depends-on = ["install"], cmd = "pytest" }

[package.build.backend]
name = "pixi-build-python"
version = "*"

[package.host-dependencies]
python = ">=3.11,<3.15"
setuptools = ">=61.0"
cython = ">=3.0"
pip = "*"
