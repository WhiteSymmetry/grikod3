[workspace]
preview = ["pixi-build"]
authors = ["Mehmet Keçeci <mkececi@yaani.com>"]
channels = ["pypi", "https://prefix.dev", "conda-forge"]
# 🌍 Tüm hedef platformları buraya da ekliyoruz:
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]
name = "grikod3"
version = "0.1.6"

[package]
name = "grikod3"
version = "0.1.6"
license = "AGPL-3.0-or-later"

[dependencies]
python = ">=3.11"
pip = ">=25.3"
# ❌ HATALI: build = "*" satırını SİLİN veya aşağıdaki gibi DEĞİŞTİRİN:
python-build = "*"  # Conda-Forge'daki karşılığı budur
conda-build = ">=26.3.0"
setuptools = ">=82.0.1"
wheel = ">=0.47.0"
# hatchling = ">=1.29.0"  <- pyproject.toml setuptools kullandığı için bu satır da gereksizdir, silebilirsiniz.
setuptools_scm = ">=9.2.2"
rattler-build = ">=0.67.0"
numpy = ">=2.4.6"
cython = ">=3.2.8"
pytest = ">=9.1.1"

[tasks]
# Artık python-build yüklendiği için bu komut hata vermez:
build = "python -m build"
start = "python -c 'import grikod3; print(grikod3.__version__)'"
install = "pip install -e ."
test = { depends-on = ["install"], cmd = "pytest" }

[package.build.backend]
name = "pixi-build-python"
version = "*"

# DOĞRU HOST BAĞIMLILIKLARI (hatchling silindi, setuptools ve cython eklendi)
[package.host-dependencies]
python = ">=3.11"
setuptools = ">=61.0"
cython = ">=3.0.0"
pip = "*"
